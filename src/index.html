<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>
<body>
    <div id="sidebar">
    </div>
    <div id="mainPanel">
    </div>

    <dialog id="editDialog"> 
        <p>Edit your Todo informations</p>
        <form>
            <label>
                Title: <input type="text" name="title">
            </label>
            <label>
                Description: <input type="text" name="description">
            </label>
            <label>
                Due date <input type="date" name="dueDate">
            </label>
            <label>
                Priority <input type="number" min="1" max="5" name="priority">
            </label>
            <label>
                Notes <input type="text" name="notes">
            </label>
            <label>
                Checklist <input type="checkbox" name="checklist">
            </label>
        </form>
        <button class="saveBtn">Save Changes</button>
        <button class="closeBtn">Close without saving</button>
    </dialog>
</body>
</html>
